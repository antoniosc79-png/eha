<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#08101c" />
  <title>Alliance Men</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="brand" data-tab="home" aria-label="Alliance Men home">
        <img src="assets/ministry-logo.png" alt="Alliance Men" />
      </button>
      <button class="avatar" data-tab="members" aria-label="View your profile">TD</button>
    </header>

    <main id="app" aria-live="polite"></main>

    <nav class="tabbar" aria-label="Primary navigation">
      <button class="tab active" data-tab="home"><span class="icon">⌂</span><span>Home</span></button>
      <button class="tab" data-tab="events"><span class="icon">□</span><span>Events</span></button>
      <button class="tab" data-tab="members"><span class="icon">◉</span><span>Members</span></button>
      <button class="tab" data-tab="give"><span class="icon">◇</span><span>Give</span></button>
      <button class="tab" data-tab="about"><span class="icon">○</span><span>About</span></button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
